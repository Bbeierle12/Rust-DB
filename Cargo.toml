[package]
name = "rust-dst-db"
version = "0.1.0"
edition = "2024"

[lib]
name = "rust_dst_db"
crate-type = ["cdylib", "rlib"]

[features]
pgwire = ["dep:pgwire", "dep:tokio", "dep:async-trait", "dep:futures"]
python = ["dep:pyo3"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module"], optional = true }
crc32fast = "1"
bytes = "1"
sqlparser = "0.53"
pgwire      = { version = "0.26", optional = true }
tokio       = { version = "1",    features = ["full"], optional = true }
async-trait = { version = "0.1",  optional = true }
futures     = { version = "0.3",  optional = true }
